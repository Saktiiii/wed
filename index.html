<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Undangan • Bagas & Sindi</title>
    
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Urbanist', sans-serif;
            background: #1e1e1e;
            height: 100vh;
            /* Penting: mencegah scroll saat cover aktif */
            overflow: hidden; 
        }
        .cover-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            /* Optimasi background: center center agar subjek foto aman di HP */
            background: linear-gradient(165deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3)), 
                        url('image/slider/IMG_5952.jpg') center center / cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .cover-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }
        .cover-content {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 600px;
            padding: 15px;
            color: #fff;
        }
        .cover-sub {
            letter-spacing: 4px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            font-weight: 400;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .cover-nama {
            /* Menggunakan clamp agar responsif: min 2.5rem, max 5rem */
            font-size: clamp(2.5rem, 8vw, 5rem);    
            font-weight: 800;
            line-height: 1.2;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #f9e2b7, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .cover-nama span {
            display: block; /* Turun ke bawah di layar kecil agar rapi */
            font-size: 0.5em;
            font-weight: 300;
            color: #f3e6c8;
            margin: 0.2rem 0;
        }
        .cover-date {
            font-size: clamp(1rem, 4vw, 1.5rem);
            letter-spacing: 5px;
            border-top: 1px solid rgba(255,255,255,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.4);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            margin: 1.5rem 0;
            font-weight: 500;
        }
        .cover-to {
            font-size: 0.9rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: #f3e6d2;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .cover-nama-tamu {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 2rem;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            padding: 0 20px;
        }
        .btn-buka {
            background: #dbbf8c;
            border: none;
            color: #1e2a1e;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-buka:active {
            transform: scale(0.95);
        }
        .small-note {
            position: absolute;
            bottom: 20px;
            width: 100%;
            left: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            z-index: 20;
        }
        .music-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 30;
            color: white;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            backdrop-filter: blur(4px);
        }

        /* Desktop Adjustment */
        @media (min-width: 992px) {
            .cover-nama span { display: inline-block; margin: 0 1rem; }
        }
    </style>
</head>
<body>

    <audio id="bgMusicCover" loop preload="auto">
        <source src="CintaTerakhir.mp3" type="audio/mpeg">
    </audio>

    <div class="cover-wrapper" id="coverSection">
        <div class="cover-overlay"></div>

        <div class="cover-content" data-aos="fade-up">
            <div class="cover-sub">The Wedding of</div>
            
            <h1 class="cover-nama">
                Sindi <span>&</span>  Bagas
            </h1>
            
            <div class="cover-date">29 . 03 . 2026</div>
            
            <div class="cover-to">Kepada Yth.</div>
            <div class="cover-nama-tamu" id="namaTamuCover">Bpk/Ibu/Saudara/i</div>
            
            <button class="btn-buka" id="bukaUndanganBtn">
                🕊️ Buka Undangan
            </button>
        </div>

        <div class="small-note">✨ Bagas & Sindi Wedding</div>
    </div>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    
        // Ambil nama dari URL
        const params = new URLSearchParams(window.location.search);
        const nama = params.get("to");
        if (nama) {
            document.getElementById("namaTamuCover").innerText = decodeURIComponent(nama);
        }
    
        // Music control
        const bgMusic = document.getElementById('bgMusicCover');
        const bukaBtn = document.getElementById('bukaUndanganBtn');
    
        let hasPlayed = false;  // Flag agar tidak play berulang
    
        // Fungsi play music (dengan error handling)
        function tryPlayMusic() {
            if (hasPlayed || !bgMusic.paused) return;
    
            bgMusic.play()
                .then(() => {
                    hasPlayed = true;
                    console.log("Musik mulai diputar");
                })
                .catch(err => {
                    console.log("Play dicegah browser:", err);
                    // Bisa tambah fallback: tampilkan hint "Tap untuk play musik" jika perlu
                });
        }
    
        // 1. Klik tombol "Buka Undangan" → play + redirect
        bukaBtn.addEventListener('click', function(e) {
            e.preventDefault();  // cegah default jika ada
    
            tryPlayMusic();
    
            // Animasi feedback
            this.style.transform = "scale(0.92)";
            this.innerHTML = "Membuka...";
    
            setTimeout(() => {
                const urlNama = nama ? `?to=${encodeURIComponent(nama)}` : '';
                window.location.href = 'Isi.html' + urlNama;
            }, 600);  // delay sedikit agar animasi terasa
        });
    
        // 2. Play otomatis setelah interaksi pertama di halaman (klik / touch di mana saja)
        function handleFirstInteraction() {
            tryPlayMusic();
            // Hapus listener setelah pertama kali (efisiensi)
            document.body.removeEventListener('click', handleFirstInteraction);
            document.body.removeEventListener('touchstart', handleFirstInteraction);
        }
    
        // Tambah listener untuk interaksi (mobile + desktop)
        document.body.addEventListener('click', handleFirstInteraction, { once: false });
        document.body.addEventListener('touchstart', handleFirstInteraction, { passive: true, once: false });
    
        // Fallback: jika user langsung tap tombol tanpa tap area lain
        // (sudah tercover di atas)
    </script>
    
</body>
</html>
